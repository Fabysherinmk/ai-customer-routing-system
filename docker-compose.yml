version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crrs-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crrs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHEEP", "pg_isready", "-U", "postgres"]
      test: ["CMD-SHELL", "pg_isready -d crrs -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crrs-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/crrs?schema=public
      - JWT_SECRET=supersecret_jwt_key_12345_crrs
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    # Start command executes Prisma schema sync, runs database seed, and fires the Express server
    entrypoint: >
      sh -c "
        npx prisma db push --accept-data-loss &&
        npx prisma db seed &&
        node dist/app.js
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crrs-ui
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_WS_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  pgdata:
